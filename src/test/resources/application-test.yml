de:
  flapdoodle:
    mongodb:
      embedded:
        version: 7.0.0

spring:
  data:
    mongodb:
      auto-index-creation: true
      host: localhost
      port: 0
  rabbitmq:
    listener:
      simple:
        auto-startup: false
  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false